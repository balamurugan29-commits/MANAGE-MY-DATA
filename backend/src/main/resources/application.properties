# Spring Application Name
spring.application.name=b2b-directory

# Database Connection Details (MS SQL Server)
# Change the hostname/port/instance if your SQLEXPRESS/MSSQLSERVER is on a specific port or named instance
# e.g., jdbc:sqlserver://localhost\\SQLEXPRESS;databaseName=YellowPagesDB
spring.datasource.url=jdbc:sqlserver://localhost;databaseName=YellowPagesDB;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=Password@123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Hibernate/JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# JWT Configurations (256-bit base64-encoded secret key)
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000

# Application Port
server.port=8080
